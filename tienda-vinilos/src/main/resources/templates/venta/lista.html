<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ventas</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<header><h1>Tienda de Discos de Vinilo</h1></header>
<nav>
    <a th:href="@{/}">Inicio</a>
    <a th:href="@{/discos}">Discos</a>
    <a th:href="@{/artistas}">Artistas</a>
    <a th:href="@{/generos}">Generos</a>
    <a th:href="@{/clientes}">Clientes</a>
    <a th:href="@{/ventas}">Ventas</a>
</nav>
<div class="contenedor">
    <h2>Listado de Ventas</h2>

    <div th:if="${mensaje}" class="alerta exito" th:text="${mensaje}"></div>
    <div th:if="${error}" class="alerta error-msg" th:text="${error}"></div>

    <a class="btn" th:href="@{/ventas/nuevo}">+ Nueva Venta</a>
    <table>
        <thead><tr><th>ID</th><th>Fecha</th><th>Cliente</th><th>Disco</th><th>Cantidad</th><th>Total</th><th>Acciones</th></tr></thead>
        <tbody>
        <tr th:each="v : ${ventas}">
            <td th:text="${v.id}"></td>
            <td th:text="${v.fecha}"></td>
            <td th:text="${v.cliente != null ? v.cliente.nombre : '-'}"></td>
            <td th:text="${v.disco != null ? v.disco.titulo : '-'}"></td>
            <td th:text="${v.cantidad}"></td>
            <td th:text="${v.total}"></td>
            <td>
                <a class="btn btn-editar" th:href="@{/ventas/editar/{id}(id=${v.id})}">Editar</a>
                <a class="btn btn-eliminar" th:href="@{/ventas/eliminar/{id}(id=${v.id})}" onclick="return confirm('Eliminar esta venta?');">Eliminar</a>
            </td>
        </tr>
        <tr th:if="${ventas.isEmpty()}"><td colspan="7">No hay ventas registradas.</td></tr>
        </tbody>
    </table>
</div>
</body>
</html>

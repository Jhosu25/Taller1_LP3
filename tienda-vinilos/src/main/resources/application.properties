# =====================================================================
#  CONEXION A BASE DE DATOS RELACIONAL - MySQL  (Taller Practico 2)
# =====================================================================
# Antes de ejecutar, crea la base de datos en MySQL:
#     CREATE DATABASE tiendadb;
# Y ajusta el usuario y la contrasena segun tu instalacion.

spring.datasource.url=jdbc:mysql://localhost:3306/tiendadb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate crea/actualiza las tablas a partir de las entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Datos de ejemplo (data.sql). Cambia a "always" SOLO la primera vez
# si quieres cargar datos de prueba; dejalo en "never" para no duplicarlos.
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

server.port=8080

